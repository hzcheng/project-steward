    </filter>
    <linearGradient id="selectedTab" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#30343c"/>
      <stop offset="1" stop-color="#25282e"/>
    </linearGradient>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill:#9da0a6; font-size:11px; font-weight:700; letter-spacing:.8px; }
      .title { fill:#f1f1f1; font-size:14px; font-weight:650; }
      .rowTitle { fill:#f1f1f1; font-size:12px; font-weight:650; }
      .desc { fill:#aeb0b5; font-size:11px; }
      .meta { fill:#8d9097; font-size:10px; }
      .tab { fill:#b8bbc2; font-size:11px; font-weight:700; letter-spacing:.45px; }
      .tabActive { fill:#fff; }
    </style>
  </defs>

