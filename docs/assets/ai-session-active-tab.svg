<svg xmlns="http://www.w3.org/2000/svg" width="420" height="860" viewBox="0 0 420 860" role="img" aria-labelledby="title desc">
  <title id="title">Project Steward AI Session ACTIVE Tab 效果图</title>
  <desc id="desc">VS Code 深色主题侧边栏中的当前项目卡片，ACTIVE Tab 汇总 Codex、Kimi 和 Claude 的已打开 Session。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
