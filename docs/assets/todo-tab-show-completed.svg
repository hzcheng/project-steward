<svg xmlns="http://www.w3.org/2000/svg" width="420" height="880" viewBox="0 0 420 880" role="img" aria-labelledby="title desc">
  <title id="title">Project Steward TODO 显示完成项效果图</title>
  <desc id="desc">TODO Tab 中打开显示完成项开关，完成项保留在原分组底部并使用弱化样式和删除线。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity=".25"/>
    </filter>
    <linearGradient id="selectedTab" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#30333a"/>
      <stop offset="1" stop-color="#26282e"/>
    </linearGradient>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill:#cfd1d6; font-size:11px; font-weight:700; letter-spacing:.7px; }
      .tab { fill:#b8bbc2; font-size:11px; font-weight:700; letter-spacing:.5px; }
      .tabActive { fill:#fff; }
      .title { fill:#f1f1f1; font-size:13px; font-weight:650; }
      .doneTitle { fill:#8d9097; font-size:13px; font-weight:650; text-decoration:line-through; }
      .desc { fill:#aeb0b5; font-size:10.5px; }
      .doneDesc { fill:#72757c; font-size:10.5px; }
      .meta { fill:#8d9097; font-size:10px; }
