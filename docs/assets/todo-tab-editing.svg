<svg xmlns="http://www.w3.org/2000/svg" width="420" height="900" viewBox="0 0 420 900" role="img" aria-labelledby="title desc">
  <title id="title">Project Steward TODO 侧边栏编辑效果图</title>
  <desc id="desc">TODO Tab 中直接编辑任务，包含标题输入、优先级分段选择、纯文本备注和保存取消操作。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity=".3"/>
    </filter>
    <linearGradient id="selectedTab" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#30333a"/>
      <stop offset="1" stop-color="#26282e"/>
    </linearGradient>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill:#cfd1d6; font-size:11px; font-weight:700; letter-spacing:.7px; }
      .tab { fill:#b8bbc2; font-size:11px; font-weight:700; letter-spacing:.5px; }
      .tabActive { fill:#fff; }
      .title { fill:#f1f1f1; font-size:13px; font-weight:650; }
      .desc { fill:#aeb0b5; font-size:10.5px; }
      .meta { fill:#8d9097; font-size:10px; }
      .field { fill:#dedfe3; font-size:12px; }
    </style>
  </defs>

  <rect width="420" height="900" fill="#181818"/>
  <rect x="0" y="0" width="420" height="34" fill="#202124"/>
  <text class="ui label" x="18" y="22">PROJECT STEWARD</text>
  <rect x="12" y="44" width="316" height="34" rx="17" fill="#25262a" stroke="#35373d"/>
  <circle cx="31" cy="61" r="6" fill="none" stroke="#8e9198" stroke-width="1.5"/>
  <path d="M35.5 65.5l5 5" stroke="#8e9198" stroke-width="1.5"/>
  <text class="ui desc" x="51" y="65">Search projects, sessions, and todos</text>
  <circle cx="347" cy="61" r="15" fill="#242529" stroke="#34363b"/>
  <path d="M340 58h14m-11-5l-4 5 4 5m8 6l4-5-4-5" fill="none" stroke="#aeb0b5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="386" cy="61" r="15" fill="#242529"/>
  <path d="M386 52v3m0 12v3m-9-9h3m12 0h3m-14.5-5.5l2.2 2.2m6.6 6.6l2.2 2.2m0-11l-2.2 2.2m-6.6 6.6l-2.2 2.2" stroke="#aeb0b5" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="386" cy="61" r="4.5" fill="none" stroke="#aeb0b5" stroke-width="1.5"/>

  <rect x="12" y="88" width="396" height="42" rx="9" fill="#111214" stroke="#34363b"/>
  <text class="ui tab" x="54" y="113">OPEN</text>
  <text class="ui tab" x="165" y="113">PROJECTS</text>
  <rect x="284" y="92" width="120" height="34" rx="7" fill="url(#selectedTab)" stroke="#4c9aff"/>
  <text class="ui tab tabActive" x="326" y="113">TODO</text>
  <line x1="0" y1="140" x2="420" y2="140" stroke="#303136"/>

  <rect x="14" y="153" width="392" height="34" rx="8" fill="#25262a" stroke="#3a3c42"/>
  <path d="M29 165l5 5 5-5" fill="none" stroke="#c5c7cc" stroke-width="1.5"/>
  <text class="ui label" x="50" y="175">RELEASE PLAN</text>
  <text class="ui meta" x="333" y="175">editing</text>

  <rect x="16" y="201" width="388" height="354" rx="14" fill="#24262c" stroke="#4c9aff" filter="url(#shadow)"/>
  <text class="ui label" x="34" y="229">EDIT TODO</text>
  <circle cx="35" cy="259" r="8" fill="none" stroke="#d64b4b" stroke-width="1.8"/>

  <text class="ui meta" x="54" y="253">Title</text>
  <rect x="54" y="264" width="322" height="34" rx="7" fill="#1c1d21" stroke="#4c9aff"/>
  <text class="ui field" x="66" y="285">Draft marketplace release checklist</text>
  <line x1="285" y1="272" x2="285" y2="290" stroke="#d7d8dc"/>

  <text class="ui meta" x="54" y="326">Priority</text>
  <rect x="54" y="338" width="322" height="32" rx="8" fill="#1c1d21" stroke="#45474e"/>
  <rect x="58" y="342" width="102" height="24" rx="6" fill="#5a2323" stroke="#d64b4b"/>
  <text class="ui label" x="91" y="358" fill="#ffcccc">HIGH</text>
  <text class="ui desc" x="198" y="358">MED</text>
  <text class="ui desc" x="307" y="358">LOW</text>

  <text class="ui meta" x="54" y="398">Notes</text>
  <rect x="54" y="410" width="322" height="92" rx="7" fill="#1c1d21" stroke="#45474e"/>
  <text class="ui desc" x="66" y="433">Cover VSIX artifacts, install order,</text>
  <text class="ui desc" x="66" y="453">manual smoke test notes, and publish</text>
  <text class="ui desc" x="66" y="473">rollback steps.</text>

  <rect x="210" y="517" width="76" height="28" rx="7" fill="#1c1d21" stroke="#45474e"/>
  <text class="ui desc" x="232" y="535">Cancel</text>
  <rect x="298" y="517" width="78" height="28" rx="7" fill="#2d4b70" stroke="#4c9aff"/>
  <path d="M316 526l5 5 10-11" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="ui label" x="338" y="535" fill="#fff">Save</text>

  <rect x="16" y="575" width="388" height="78" rx="10" fill="#222328" stroke="#3a3c42"/>
  <circle cx="35" cy="598" r="8" fill="none" stroke="#d7ba7d" stroke-width="1.8"/>
  <rect x="54" y="586" width="32" height="18" rx="9" fill="#44371f" stroke="#d7ba7d"/>
  <text class="ui label" x="64" y="599" fill="#f1dca8" font-size="9">MED</text>
  <text class="ui title" x="98" y="599">Validate changelog wording</text>
  <text class="ui desc" x="54" y="623">Keep user-facing items short.</text>
  <text class="ui meta" x="54" y="640">Another todo remains below the editor</text>

  <rect x="16" y="675" width="388" height="52" rx="10" fill="#1e1f23" stroke="#3a3c42" stroke-dasharray="5 4"/>
  <path d="M169 693v16m-8-8h16" stroke="#aeb0b5" stroke-width="1.6" stroke-linecap="round"/>
  <text class="ui desc" x="190" y="705">Add todo to Release Plan</text>
</svg>
