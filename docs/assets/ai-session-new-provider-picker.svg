<svg xmlns="http://www.w3.org/2000/svg" width="720" height="560" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">Project Steward New Session Provider Picker 效果图</title>
  <desc id="desc">点击共享 New Session 操作后出现 VS Code Quick Pick，要求用户明确选择 Codex、Kimi 或 Claude。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity=".6"/></filter>
    <linearGradient id="selectedTab" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#30343c"/><stop offset="1" stop-color="#25282e"/></linearGradient>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill:#9da0a6; font-size:11px; font-weight:700; letter-spacing:.8px; }
      .title { fill:#f1f1f1; font-size:14px; font-weight:650; }
      .rowTitle { fill:#f1f1f1; font-size:13px; font-weight:650; }
      .desc { fill:#aeb0b5; font-size:11px; }
      .meta { fill:#8d9097; font-size:10px; }
      .tab { fill:#b8bbc2; font-size:11px; font-weight:700; letter-spacing:.45px; }
    </style>
  </defs>
  <rect width="720" height="560" fill="#181818"/>
  <rect x="0" y="0" width="720" height="34" fill="#202124"/>
  <text class="ui label" x="18" y="22" fill="#c8c8c8">PROJECT STEWARD</text>
  <rect x="20" y="52" width="330" height="34" rx="17" fill="#25262a" stroke="#35373d"/>
  <text class="ui desc" x="42" y="73">Search all projects and sessions</text>

  <rect x="20" y="106" width="680" height="402" rx="17" fill="#25272c" stroke="#4c9aff"/>
  <rect x="20" y="106" width="5" height="402" rx="2.5" fill="#4c9aff"/>
  <text class="ui title" x="52" y="142">vscode-dashboard</text>
  <text class="ui desc" x="52" y="161">Project Steward extension</text>
  <line x1="40" y1="180" x2="680" y2="180" stroke="#3b3d43"/>
  <text class="ui label" x="40" y="207" fill="#d6d8dc">AI SESSIONS</text>
  <rect x="605" y="189" width="75" height="28" rx="14" fill="#15304a" stroke="#4c9aff"/>
  <path d="M621 199v8m-4-4h8" stroke="#a9d3ff" stroke-width="1.5" stroke-linecap="round"/>
  <text class="ui tab" x="632" y="207" fill="#fff">NEW</text>
  <rect x="40" y="229" width="640" height="38" rx="9" fill="#181a1e" stroke="#3d4047"/>
  <rect x="44" y="233" width="312" height="30" rx="7" fill="url(#selectedTab)" stroke="#4c9aff"/>
  <text class="ui tab" x="168" y="252" fill="#fff">ACTIVE 3</text>
  <text class="ui tab" x="482" y="252">SESSIONS 18</text>
  <rect x="40" y="282" width="640" height="68" rx="10" fill="#222329" stroke="#3b3d43"/>
  <text class="ui rowTitle" x="58" y="310">设计 Session 管理体验</text>
  <text class="ui meta" x="58" y="330">Codex · Needs attention · 2 min ago</text>
  <rect x="40" y="362" width="640" height="68" rx="10" fill="#222329" stroke="#3b3d43"/>
  <text class="ui rowTitle" x="58" y="390">修复 terminal 生命周期</text>
  <text class="ui meta" x="58" y="410">Claude · Focused · 18 min ago</text>

  <rect width="720" height="560" fill="#08090b" opacity=".58"/>
  <rect x="145" y="86" width="430" height="385" rx="8" fill="#252526" stroke="#4c9aff" filter="url(#shadow)"/>
  <text class="ui title" x="169" y="118">Select an AI provider</text>
  <text class="ui desc" x="169" y="137">Choose which AI should start the new session.</text>
  <rect x="165" y="153" width="390" height="34" rx="3" fill="#1f1f1f" stroke="#4c9aff"/>
  <text class="ui desc" x="181" y="175" fill="#d8d8d8">Type to filter providers</text>

  <rect x="165" y="199" width="390" height="70" rx="5" fill="#094771" stroke="#4c9aff"/>
  <circle cx="192" cy="222" r="14" fill="#162f45" stroke="#8fc7ff"/>
  <path d="M184 216l7 7-7 7m11 0h8" fill="none" stroke="#8fc7ff" stroke-width="1.6"/>
  <text class="ui rowTitle" x="219" y="221">Codex</text>
  <text class="ui desc" x="219" y="243" fill="#d7eaff">Open a new Codex session</text>

  <rect x="165" y="277" width="390" height="70" rx="5" fill="#2d2d30" stroke="#3f3f46"/>
  <circle cx="192" cy="300" r="14" fill="#35243a" stroke="#c586c0"/>
  <text class="ui title" x="187" y="305" fill="#dca6d8">K</text>
  <text class="ui rowTitle" x="219" y="299">Kimi</text>
  <text class="ui desc" x="219" y="321">Open a new Kimi session</text>

  <rect x="165" y="355" width="390" height="70" rx="5" fill="#2d2d30" stroke="#3f3f46"/>
  <circle cx="192" cy="378" r="14" fill="#3a3223" stroke="#d7ba7d"/>
  <text class="ui title" x="187" y="383" fill="#e4cf9c">C</text>
  <text class="ui rowTitle" x="219" y="377">Claude</text>
  <text class="ui desc" x="219" y="399">Open a new Claude session</text>

  <line x1="165" y1="438" x2="555" y2="438" stroke="#3f3f46"/>
  <text class="ui meta" x="169" y="457">↑↓ Navigate   Enter Select   Esc Cancel</text>
  <text class="ui meta" x="551" y="457" text-anchor="end">Provider is never chosen implicitly</text>
</svg>
