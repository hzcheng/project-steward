<svg xmlns="http://www.w3.org/2000/svg" width="420" height="900" viewBox="0 0 420 900" role="img" aria-labelledby="title desc">
  <title id="title">Project Steward TODO 按优先级排序效果图</title>
  <desc id="desc">TODO Tab 中打开分组操作菜单，用户可以保留手动排序或对当前分组执行一次按优先级排序。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <linearGradient id="selectedTab" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#30333a"/>
      <stop offset="1" stop-color="#26282e"/>
    </linearGradient>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill:#cfd1d6; font-size:11px; font-weight:700; letter-spacing:.7px; }
      .tab { fill:#b8bbc2; font-size:11px; font-weight:700; letter-spacing:.5px; }
      .tabActive { fill:#fff; }
      .title { fill:#f1f1f1; font-size:13px; font-weight:650; }
      .desc { fill:#aeb0b5; font-size:10.5px; }
      .meta { fill:#8d9097; font-size:10px; }
      .priority { font-size:9px; font-weight:700; }
    </style>
  </defs>

  <rect width="420" height="900" fill="#181818"/>
  <rect x="0" y="0" width="420" height="34" fill="#202124"/>
  <text class="ui label" x="18" y="22">PROJECT STEWARD</text>
  <rect x="12" y="44" width="316" height="34" rx="17" fill="#25262a" stroke="#35373d"/>
  <circle cx="31" cy="61" r="6" fill="none" stroke="#8e9198" stroke-width="1.5"/>
  <path d="M35.5 65.5l5 5" stroke="#8e9198" stroke-width="1.5"/>
  <text class="ui desc" x="51" y="65">Search projects, sessions, and todos</text>
  <circle cx="347" cy="61" r="15" fill="#242529" stroke="#34363b"/>
  <path d="M340 58h14m-11-5l-4 5 4 5m8 6l4-5-4-5" fill="none" stroke="#aeb0b5" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="386" cy="61" r="15" fill="#242529"/>
  <path d="M386 52v3m0 12v3m-9-9h3m12 0h3m-14.5-5.5l2.2 2.2m6.6 6.6l2.2 2.2m0-11l-2.2 2.2m-6.6 6.6l-2.2 2.2" stroke="#aeb0b5" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="386" cy="61" r="4.5" fill="none" stroke="#aeb0b5" stroke-width="1.5"/>

  <rect x="12" y="88" width="396" height="42" rx="9" fill="#111214" stroke="#34363b"/>
  <text class="ui tab" x="54" y="113">OPEN</text>
  <text class="ui tab" x="165" y="113">PROJECTS</text>
  <rect x="284" y="92" width="120" height="34" rx="7" fill="url(#selectedTab)" stroke="#4c9aff"/>
  <text class="ui tab tabActive" x="326" y="113">TODO</text>
  <line x1="0" y1="140" x2="420" y2="140" stroke="#303136"/>

  <rect x="14" y="153" width="392" height="44" rx="10" fill="#25262a" stroke="#3a3c42"/>
  <text class="ui label" x="31" y="181">TODO</text>
  <text class="ui meta" x="74" y="181">Manual order · Sort is a one-time action</text>
  <rect x="323" y="162" width="30" height="26" rx="7" fill="#1c1d21" stroke="#45474e"/>
  <path d="M334 169h9m-9 6h7m-7 6h4" stroke="#c7c9ce" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="361" y="162" width="31" height="26" rx="7" fill="#1c1d21" stroke="#45474e"/>
  <path d="M372 169l4 4 4-4m-8 8l4 4 4-4" fill="none" stroke="#c7c9ce" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="14" y="214" width="392" height="34" rx="8" fill="#25262a" stroke="#3a3c42"/>
  <path d="M29 226l5 5 5-5" fill="none" stroke="#c5c7cc" stroke-width="1.5"/>
  <text class="ui label" x="50" y="236">REFACTOR BACKLOG</text>
  <text class="ui meta" x="315" y="236">5 open</text>
  <circle cx="380" cy="231" r="13" fill="#1c1d21" stroke="#4c9aff"/>
  <circle cx="375" cy="231" r="1.5" fill="#c7c9ce"/>
  <circle cx="380" cy="231" r="1.5" fill="#c7c9ce"/>
  <circle cx="385" cy="231" r="1.5" fill="#c7c9ce"/>

  <rect x="206" y="252" width="188" height="150" rx="8" fill="#25262a" stroke="#4c9aff" filter="url(#shadow)"/>
  <text class="ui title" x="224" y="281">Group actions</text>
  <line x1="206" y1="295" x2="394" y2="295" stroke="#3a3c42"/>
  <text class="ui desc" x="224" y="321">Rename group</text>
  <text class="ui desc" x="224" y="350">Add todo</text>
  <rect x="214" y="364" width="172" height="28" rx="6" fill="#2d4b70" stroke="#4c9aff"/>
  <path d="M228 373h12m-8-5l-4 5 4 5m22-5h12m-4-5l4 5-4 5" fill="none" stroke="#d8ecff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="ui desc" x="274" y="382" fill="#d8ecff">Sort by priority</text>

  <rect x="16" y="424" width="388" height="78" rx="10" fill="#222328" stroke="#3a3c42" filter="url(#shadow)"/>
  <circle cx="35" cy="447" r="8" fill="none" stroke="#d64b4b" stroke-width="1.8"/>
  <rect x="54" y="435" width="36" height="18" rx="9" fill="#5a2323" stroke="#d64b4b"/>
  <text class="ui priority" x="65" y="448" fill="#ffcccc">HIGH</text>
  <text class="ui title" x="101" y="448">Split TODO store from dashboard activation</text>
  <text class="ui desc" x="54" y="472">Moved to top by priority sort.</text>
  <text class="ui meta" x="54" y="489">High priority</text>

  <rect x="16" y="512" width="388" height="78" rx="10" fill="#222328" stroke="#3a3c42"/>
  <circle cx="35" cy="535" r="8" fill="none" stroke="#d7ba7d" stroke-width="1.8"/>
  <rect x="54" y="523" width="32" height="18" rx="9" fill="#44371f" stroke="#d7ba7d"/>
  <text class="ui priority" x="64" y="536" fill="#f1dca8">MED</text>
  <text class="ui title" x="98" y="536">Extract TODO mutation tests</text>
  <text class="ui desc" x="54" y="560">Medium items keep their relative manual order.</text>
  <text class="ui meta" x="54" y="577">Medium priority</text>

  <rect x="16" y="600" width="388" height="78" rx="10" fill="#222328" stroke="#3a3c42"/>
  <circle cx="35" cy="623" r="8" fill="none" stroke="#6a9955" stroke-width="1.8"/>
  <rect x="54" y="611" width="31" height="18" rx="9" fill="#21351f" stroke="#6a9955"/>
  <text class="ui priority" x="64" y="624" fill="#b7ddb0">LOW</text>
  <text class="ui title" x="97" y="624">Polish empty state copy</text>
  <text class="ui desc" x="54" y="648">Low priority moves below High and Medium.</text>
  <text class="ui meta" x="54" y="665">Low priority</text>
</svg>
