name: Release VSIX

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release. Leave empty to use package.json."
        required: false
        type: string
      draft:
        description: "Create the GitHub release as a draft."
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and release VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          publisher="$(node -p "require('./package.json').publisher")"
          bridge_name="$(node -p "require('./extensions/attention-ui-bridge/package.json').name")"
          bridge_version="$(node -p "require('./extensions/attention-ui-bridge/package.json').version")"
          bridge_publisher="$(node -p "require('./extensions/attention-ui-bridge/package.json').publisher")"
          requested_version="${{ inputs.version }}"
          trigger_ref_type="${{ github.ref_type }}"
          trigger_ref_name="${{ github.ref_name }}"

          if [[ -n "$requested_version" && "$requested_version" != "$package_version" ]]; then
            echo "Requested version $requested_version does not match package.json version $package_version." >&2
            echo "Update package.json first, then run this workflow again." >&2
            exit 1
          fi

          version="${requested_version:-$package_version}"
          tag="v${version}"

          if [[ "$trigger_ref_type" == "tag" && "$trigger_ref_name" != "$tag" ]]; then
            echo "Tag $trigger_ref_name does not match package.json version $package_version." >&2
            echo "Expected tag: $tag" >&2
            exit 1
          fi

          vsix_file="artifacts/${package_name}-${version}.vsix"
          bridge_vsix_file="artifacts/${bridge_name}-${bridge_version}.vsix"

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "publisher=$publisher" >> "$GITHUB_OUTPUT"
          echo "bridge_name=$bridge_name" >> "$GITHUB_OUTPUT"
          echo "bridge_version=$bridge_version" >> "$GITHUB_OUTPUT"
          echo "bridge_publisher=$bridge_publisher" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "vsix_file=$vsix_file" >> "$GITHUB_OUTPUT"
          echo "bridge_vsix_file=$bridge_vsix_file" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Verify release notes
        run: npm run test:release-notes

      - name: Compile
        run: npm run test-compile && npm run attention:bridge:compile

      - name: Lint
        run: npm run lint

      - name: Package and verify release VSIX files
        run: npm run test:release-packaging

      - name: Write package summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## VSIX files"
            echo
            echo "| Extension | Version | File | SHA-256 |"
            echo "| --- | --- | --- | --- |"
            echo "| ${{ steps.meta.outputs.bridge_publisher }}.${{ steps.meta.outputs.bridge_name }} | ${{ steps.meta.outputs.bridge_version }} | ${{ steps.meta.outputs.bridge_vsix_file }} | $(sha256sum "${{ steps.meta.outputs.bridge_vsix_file }}" | awk '{print $1}') |"
            echo "| ${{ steps.meta.outputs.publisher }}.${{ steps.meta.outputs.package_name }} | ${{ steps.meta.outputs.version }} | ${{ steps.meta.outputs.vsix_file }} | $(sha256sum "${{ steps.meta.outputs.vsix_file }}" | awk '{print $1}') |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-steward-${{ steps.meta.outputs.version }}-vsix
          path: |
            ${{ steps.meta.outputs.bridge_vsix_file }}
            ${{ steps.meta.outputs.vsix_file }}
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          MAIN_VSIX_FILE: ${{ steps.meta.outputs.vsix_file }}
          BRIDGE_VSIX_FILE: ${{ steps.meta.outputs.bridge_vsix_file }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Delete it or bump package.json before publishing again." >&2
            exit 1
          fi

          args=()
          if [[ "$DRAFT" == "true" ]]; then
            args+=(--draft)
          fi
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          node scripts/extract-release-notes.js "$VERSION" > release-notes.md

          gh release create "$TAG" "$BRIDGE_VSIX_FILE" "$MAIN_VSIX_FILE" \
            --title "Project Steward ${VERSION}" \
            --notes-file release-notes.md \
            "${args[@]}"
