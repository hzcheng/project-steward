name: Scheduled verification

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    uses: ./.github/workflows/verify.yml

  scheduled-macos:
    name: scheduled-macos
    needs: verify
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run stable Extension Host smoke
        run: npm run test:extension-host
